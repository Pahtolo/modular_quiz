name: macOS Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: electron/package-lock.json

      - name: Install OCR runtime dependencies
        run: |
          brew update
          brew install tesseract poppler

      - name: Install backend build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-api.txt pyinstaller

      - name: Install frontend dependencies
        working-directory: electron
        run: npm ci

      - name: Build macOS DMG
        working-directory: electron
        run: PYTHON_BIN=python3 npm run dist -- --mac dmg

      - name: Upload macOS installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: modular-quiz-macos-installer
          path: |
            electron/dist/*.dmg
            electron/dist/*.dmg.blockmap
          if-no-files-found: error

      - name: Attach tag assets to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            electron/dist/*.dmg
            electron/dist/*.dmg.blockmap
