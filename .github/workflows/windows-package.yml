name: Windows Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: electron/package-lock.json

      - name: Install OCR runtime dependencies
        shell: powershell
        run: |
          choco install -y tesseract poppler
          $tesseractExe = Get-ChildItem "C:\Program Files\Tesseract-OCR" -Filter "tesseract.exe" -File -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $tesseractExe) {
            $tesseractExe = Get-ChildItem "C:\ProgramData\chocolatey\lib" -Recurse -Filter "tesseract.exe" -File -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($null -eq $tesseractExe) {
            throw "Unable to locate tesseract.exe after Chocolatey install."
          }
          $tesseractBin = Split-Path $tesseractExe.FullName -Parent

          $popplerRoot = Get-ChildItem "C:\ProgramData\chocolatey\lib" -Directory -Filter "poppler*" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if ($null -eq $popplerRoot) {
            throw "Unable to locate Chocolatey poppler installation"
          }
          $pdftoppmExe = Get-ChildItem $popplerRoot.FullName -Recurse -Filter "pdftoppm.exe" -File -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if ($null -eq $pdftoppmExe) {
            throw "Unable to locate pdftoppm.exe in Chocolatey poppler installation"
          }
          $popplerBin = Split-Path $pdftoppmExe.FullName -Parent

          "$tesseractBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "$popplerBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install backend build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-api.txt pyinstaller

      - name: Install frontend dependencies
        working-directory: electron
        run: npm ci

      - name: Build Windows installer
        working-directory: electron
        run: npm run dist -- --win nsis

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: modular-quiz-windows-installer
          path: |
            electron/dist/*Setup*.exe
            electron/dist/*.blockmap
            electron/dist/latest*.yml
          if-no-files-found: error

      - name: Attach tag assets to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            electron/dist/*Setup*.exe
            electron/dist/*.blockmap
            electron/dist/latest*.yml
